<ng-container *ngIf="modal$ | async as modal">
  <div class="access-modal-backdrop" (click)="close()"></div>
  <section class="access-modal" role="alertdialog" aria-modal="true" aria-labelledby="access-modal-title">
    <div class="access-modal__icon">
      <i class="ri-shield-keyhole-line"></i>
    </div>
    <h2 id="access-modal-title">{{ modal.title }}</h2>
    <p>{{ modal.message }}</p>
    <button type="button" class="btn-primary" (click)="close()">Return to Dashboard</button>
  </section>
</ng-container>

<div class="auth-container">
  <div class="auth-wrapper compact">
    <div class="auth-form-panel solo">
      <div class="auth-card">
        <div class="auth-header">
          <h2>Set a New Password</h2>
          <p>Your account was created with a temporary password. Update it before continuing.</p>
        </div>

        <form [formGroup]="passwordForm" (ngSubmit)="onSubmit()" class="auth-form">
          <div class="form-group">
            <label class="form-label" for="currentPassword">Temporary Password</label>
            <input id="currentPassword" type="password" class="form-control" formControlName="currentPassword" placeholder="Enter temporary password">
          </div>

          <div class="form-group">
            <label class="form-label" for="newPassword">New Password</label>
            <input id="newPassword" type="password" class="form-control" formControlName="newPassword" placeholder="Create new password">
          </div>

          <div class="form-group">
            <label class="form-label" for="confirmPassword">Confirm New Password</label>
            <input id="confirmPassword" type="password" class="form-control" formControlName="confirmPassword" placeholder="Repeat new password">
          </div>

          <div class="success-alert" *ngIf="successMessage">
            <i class="ri-checkbox-circle-line"></i> {{ successMessage }}
          </div>

          <div class="error-alert" *ngIf="errorMessage">
            <i class="ri-error-warning-line"></i> {{ errorMessage }}
          </div>

          <button type="submit" class="btn-primary auth-submit" [disabled]="isLoading">
            <i class="ri-lock-password-line" *ngIf="!isLoading"></i>
            <i class="ri-loader-4-line spin" *ngIf="isLoading"></i>
            {{ isLoading ? 'Updating...' : 'Update Password' }}
          </button>
        </form>
      </div>
    </div>
  </div>
</div>
